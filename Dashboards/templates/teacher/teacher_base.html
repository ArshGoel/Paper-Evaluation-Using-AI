{% extends "base.html" %}
{% load static %}

{% block title %}Teacher Panel{% endblock %}
{% block teacher_dashactive %}active{% endblock teacher_dashactive %}
{% block body %}
<link rel="stylesheet" href="{% static 'css/teacher_dash.css' %}">
<style>
    .teacher-layout {
        display: flex;
        min-height: calc(100vh - 120px); /* navbar + footer adjust */
    }

    .teacher-sidebar {
        width: 250px;
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        color: white;
        padding: 20px;
    }

    .teacher-sidebar h5 {
        margin-bottom: 20px;
    }

    .teacher-sidebar a {
        display: block;
        color: white;
        padding: 10px;
        margin-bottom: 8px;
        text-decoration: none;
        border-radius: 6px;
        transition: 0.3s;
    }

    .teacher-sidebar a:hover {
        background: #ffc107;
        color: black;
    }

    .teacher-content {
        flex: 1;
        padding: 20px;
        background: #f4f6f9;
    }

    /* Responsive */
    @media (max-width: 900px) {
        .teacher-layout {
            flex-direction: column;
        }

        .teacher-sidebar {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .teacher-sidebar a {
            margin: 5px;
        }
    }
    :root {
        --primary-color: #2c3e50;
        --secondary-color: #3498db;
        --success-color: #27ae60;
        --danger-color: #e74c3c;
        --warning-color: #f39c12;
    }
    
    body {
        background-color: #f8f9fa;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .sidebar {
        min-height: 100vh;
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        color: white;
    }
    
    .sidebar .nav-link {
        color: rgba(255, 255, 255, 0.8);
        padding: 12px 20px;
        border-radius: 8px;
        margin: 5px 0;
        transition: all 0.3s ease;
    }
    
    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
        background-color: rgba(255, 255, 255, 0.1);
        color: white;
        transform: translateX(5px);
    }
    
    .card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
    }
    
    .card:hover {
        transform: translateY(-5px);
    }
    
    .btn-primary {
        background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
        border: none;
        border-radius: 25px;
        padding: 10px 25px;
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    
    .stats-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-radius: 15px;
    }
    
    .timer-display {
        font-size: 1.5rem;
        font-weight: bold;
        color: var(--danger-color);
    }
    
    .question-card {
        border-left: 4px solid var(--secondary-color);
    }
</style>

<div class="teacher-layout">

    <!-- SIDEBAR -->
    <div class="teacher-sidebar">
        <h5>Teacher Panel</h5>

        <a class="nav-link {% block teacher_adashactive %}{% endblock teacher_adashactive %}" href="{% url 'teacher_dashboard' %}"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a class="nav-link {% block teacher_aexamsactive %}{% endblock teacher_aexamsactive %}" href="{% url 'teacher_exams' %}"><i class="bi bi-file-earmark-text"></i> Exams</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="teacher-content">
        {% block teacher_content %}{% endblock %}
    </div>

</div>

{% endblock body %}
