{% extends "base.html" %}
{% load static %}

{% block title %}Admin Panel{% endblock %}
{% block admin_dashactive %}active{% endblock admin_dashactive %}

{% block body %}

<style>
    .admin-layout {
        display: flex;
        min-height: calc(100vh - 120px); /* navbar + footer adjust */
    }

    .admin-sidebar {
        width: 250px;
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        color: white;
        padding: 20px;
    }

    .admin-sidebar h5 {
        margin-bottom: 20px;
    }

    .admin-sidebar a {
        display: block;
        color: white;
        padding: 10px;
        margin-bottom: 8px;
        text-decoration: none;
        border-radius: 6px;
        transition: 0.3s;
    }

    .admin-sidebar a:hover {
        background: #ffc107;
        color: black;
    }

    .admin-content {
        flex: 1;
        padding: 20px;
        background: #f4f6f9;
    }

    /* Responsive */
    @media (max-width: 900px) {
        .admin-layout {
            flex-direction: column;
        }

        .admin-sidebar {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .admin-sidebar a {
            margin: 5px;
        }
    }
    :root {
        --primary-color: #2c3e50;
        --secondary-color: #3498db;
        --success-color: #27ae60;
        --danger-color: #e74c3c;
        --warning-color: #f39c12;
    }
    
    body {
        background-color: #f8f9fa;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .sidebar {
        min-height: 100vh;
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        color: white;
    }
    
    .sidebar .nav-link {
        color: rgba(255, 255, 255, 0.8);
        padding: 12px 20px;
        border-radius: 8px;
        margin: 5px 0;
        transition: all 0.3s ease;
    }
    
    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
        background-color: rgba(255, 255, 255, 0.1);
        color: white;
        transform: translateX(5px);
    }
    
    .card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
    }
    
    .card:hover {
        transform: translateY(-5px);
    }
    
    .btn-primary {
        background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
        border: none;
        border-radius: 25px;
        padding: 10px 25px;
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    
    .stats-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-radius: 15px;
    }
    
    .timer-display {
        font-size: 1.5rem;
        font-weight: bold;
        color: var(--danger-color);
    }
    
    .question-card {
        border-left: 4px solid var(--secondary-color);
    }
</style>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <div class="admin-sidebar">
        <h5>Admin Panel</h5>

        <a class="nav-link {% block admin_dashboard_active %}{% endblock admin_dashboard_active %}" href="{% url 'admin_dashboard' %}"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a class="nav-link {% block manage_students_active %}{% endblock manage_students_active %}" href="{% url 'manage_students' %}"><i class="bi bi-people"></i> Students</a>
        <a class="nav-link {% block manage_teachers_active %}{% endblock manage_teachers_active %}" href="{% url 'manage_teachers' %}"><i class="bi bi-person-badge"></i> Teachers</a>
        <a class="nav-link {% block manage_courses_active %}{% endblock manage_courses_active %}" href="{% url 'manage_courses' %}"><i class="bi bi-book"></i> Courses</a>
        <a class="nav-link {% block manage_classes_active %}{% endblock manage_classes_active %}" href="{% url 'manage_classes' %}"><i class="bi bi-building"></i> Classes</a>
        <a class="nav-link {% block manage_exams_active %}{% endblock manage_exams_active %}" href="{% url 'manage_exams' %}"><i class="bi bi-file-earmark-text"></i> Exams</a>
        <a class="nav-link {% block view_results_active %}{% endblock view_results_active %}" href="{% url 'view_results' %}"><i class="bi bi-bar-chart"></i> Results</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="admin-content">
        {% block admin_content %}{% endblock %}
    </div>

</div>

{% endblock %}
