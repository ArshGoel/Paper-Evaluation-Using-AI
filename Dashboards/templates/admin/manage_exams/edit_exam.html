{% extends "admin/admin_base.html" %}
{% block manage_exams_active %}active{% endblock manage_exams_active %}
{% block admin_content %}

<div class="container mt-4">

<h2>Edit Exam</h2>

<form method="POST">
    {% csrf_token %}

    <input name="title" value="{{ exam.title }}" class="form-control mb-2">

    <select name="course" class="form-control mb-2">
        {% for c in courses %}
            <option value="{{ c.id }}"
                {% if c.id == exam.course.id %}selected{% endif %}>
                {{ c.name }}
            </option>
        {% endfor %}
    </select>

    <select name="class_assigned" class="form-control mb-2">
        {% for c in classes %}
            <option value="{{ c.id }}"
                {% if c.id == exam.class_assigned.id %}selected{% endif %}>
                {{ c.name }}
            </option>
        {% endfor %}
    </select>

    <input name="total_marks" value="{{ exam.total_marks }}" class="form-control mb-2">

    <input type="datetime-local" name="date"
           value="{{ exam.date|date:'Y-m-d\\TH:i' }}"
           class="form-control mb-2">

    <button class="btn btn-success">Update</button>
    <a href="{% url 'manage_exams' %}" class="btn btn-secondary">Cancel</a>
</form>

</div>

{% endblock %}
